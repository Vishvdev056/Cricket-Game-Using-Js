<!DOCTYPE html>
<html lang="en">
<head>
  <title>Cricket Game</title>
  <link rel="stylesheet" href="cricket.css">
  <style>

  </style>
</head>
<body>
  <!-- <img src="image/bat.png" alt="Bat" class="choice-image"> -->
  <Div>
    <h1>Bat Ball Stump Game</h1>
    <div>
      
    <button class="choice-button" onclick="
  let userChoiceMsg = 'You have chosen Bat';

 let computerChoice=generateComputerChoice();
 let resultMsg=results ('Bat',computerChoice);
 showResults('Bat', computerChoice, resultMsg);
">
<img src="image/bat.png" alt="Bat" class="choice-image"width="200" height="200">
</button>
<button class="choice-button"  onclick=" 
   userChoiceMsg = 'You have chosen Ball';

  computerChoice=generateComputerChoice();
   resultMsg=results ('Ball',computerChoice);
   showResults('Ball',computerChoice,resultMsg);
">
<img src="image/ball.png" alt="Bat" class="choice-image"width="200" height="200">
</button>
      <button class="choice-button"
      onclick="
   userChoiceMsg = 'You have chosen Stump';

   computerChoice=generateComputerChoice();
    resultMsg=results ('Stump',computerChoice);
    showResults('Stump',computerChoice,resultMsg);
"><img src="image/stump.png" alt="Bat" class="choice-image" width="200" height="200">
</button>


    </div>

  </Div>

  <h3 id="user-Move"></h3>
  <h3 id="computer-Move"></h3>
  <h3 id="result"></h3>
  <h3 id="score"></h3>
  
  <button  class="choice-button" onclick="
localStorage.removeItem('results');
resetScore(null);
document.querySelector('#score').innerText = score.displayScore();
">
<img src="image/reset.png" alt="Bat" class="choice-image"width="100" height="100">
</button>
</body>
<script>
  let scoreStr = localStorage.getItem('results');
  let score = {
  win:0,
  lost:0,
  tie:0
};


resetScore(scoreStr);

document.querySelector('#score').innerText = score.displayScore();
  
function resetScore(scoreStr){
  score = JSON.parse(scoreStr) || {
    win:0,
    lost:0,
    tie:0
  };

  score.displayScore = function(){
    return `You Win ${score.win}, You Lost ${score.lost}, Match Tie ${score.tie}`;
  };
}
  function generateComputerChoice(){
       let randomNumber = Math.random() * 3;
  
        
  if (randomNumber < 1) {
    return 'Bat';
  } 
  else if (randomNumber < 2) {
    return 'Ball';
  } 
  else {
    return 'Stump';
  }
  
  }

  function results(userMove,computerMove){
    if(userMove==='Bat'){
       if (computerMove === 'Ball') {
           score.win++;
          return 'You Win';
  } 
  else if (computerMove === 'Bat') {
           score.tie++;
          return 'Match is Tie';
  } 
  else if (computerMove === 'Stump'){
          score.lost++; 
          return 'Out';
  }
    
  }else if(userMove==='Ball'){
        if (computerMove === 'Ball') {
          score.tie++;
          return 'Match is Tie';
  } 
  else if (computerMove === 'Bat') {
          score.lost++;
          return 'Computer Won';
  } 
  else if (computerMove === 'Stump'){
          score.win++
          return 'Out';
  }

  }else if(userMove==='Stump'){
     if (computerMove === 'Ball') {
            score.lost++;
          return 'Computer Won';
  } 
  else if (computerMove === 'Bat') {
          score.win++;
          return 'User Won';
  } 
  else if (computerMove === 'Stump'){
          score.tie++;
          return 'Match is Tie';
  }

  }
}
  function showResults(userMove,computerMove,results){
    document.querySelector('#user-Move').innerText=
    userMove!==undefined? `User choice is ${userMove}`:'';
    document.querySelector('#computer-Move').innerText=
    computerMove!==undefined?`Computer Choice is ${computerMove}`: '';
    document.querySelector('#result').innerText=
    results!==undefined?`${results}`: '';
    document.querySelector('#score').innerText=score.displayScore();
    
    localStorage.setItem('results', JSON.stringify(score))
    console.log(score)
    
  }
 
 
  // console.log(localStorage.getItem('results'))
  

</script>
</html>
